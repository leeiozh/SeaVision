name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win-debug.txt
          pip install pyinstaller

      - name: Build EXE (no matplotlib)
        run: pyinstaller seavision-win.spec --distpath dist --workpath build

      - name: Build EXE (debug, with matplotlib)
        run: pyinstaller seavision-win-debug.spec --distpath dist-debug --workpath build-debug

      # Windows 7/8/8.1 не содержат API-set "Path" (api-ms-win-core-path-l1-1-0.dll),
      # появившийся только в Windows 10. Python 3.9+ линкуется с ним при старте,
      # поэтому на Win7 бандл падает с "отсутствует api-ms-win-core-path-l1-1-0.dll".
      # Кладём рядом с exe open-source шим (PathCch* → легаси Shlwapi), это снимает
      # зависимость и на Win10+ не мешает (системная DLL имеет приоритет загрузки).
      - name: Add Windows 7 path-API shim
        shell: pwsh
        env:
          SHIM_VERSION: '0.3.1'
        run: |
          $url = "https://github.com/nalexandru/api-ms-win-core-path-HACK/releases/download/$env:SHIM_VERSION/api-ms-win-core-path-blender-$env:SHIM_VERSION.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile shim.zip
          Expand-Archive -Path shim.zip -DestinationPath shim -Force
          # внутри архива x64- и x86-варианты лежат в разных подпапках; берём 64-битный
          $dll = Get-ChildItem -Path shim -Recurse -Filter 'api-ms-win-core-path-l1-1-0.dll' |
                 Where-Object { $_.FullName -match '(?i)(x64|amd64|win64|\\64\\)' } |
                 Select-Object -First 1
          if (-not $dll) {
            $all = Get-ChildItem -Path shim -Recurse -Filter 'api-ms-win-core-path-l1-1-0.dll'
            Write-Error "x64 shim DLL not found. Archive contents: $($all.FullName -join ', ')"
            exit 1
          }
          Write-Host "Using shim: $($dll.FullName)"
          Copy-Item $dll.FullName 'dist/seavision/api-ms-win-core-path-l1-1-0.dll' -Force
          Copy-Item $dll.FullName 'dist-debug/seavision/api-ms-win-core-path-l1-1-0.dll' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seavision-windows-x64
          path: dist/seavision/             # штатная сборка: exe + dll, без matplotlib
          retention-days: 30

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: seavision-windows-x64-debug
          path: dist-debug/seavision/       # debug-сборка с matplotlib (pics=<путь>)
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Отдельная Win7-совместимая линия.
  # Python 3.12 импортирует из kernel32 функции, которых нет в Windows 7
  # (PssQuerySnapshot — Win8.1+; api-ms-win-core-path — Win10+). Шим лечит только
  # path-API, а PssQuerySnapshot — прямой импорт из kernel32 (KnownDLL, локально
  # не подменяется). Поэтому для Win7 собираем на Python 3.8 — последнем CPython
  # с офиц. поддержкой семёрки — с пинами numpy/scipy под cp38 и PyInstaller 5.x
  # (его бутлоадер ещё запускается на Win7). Шим path-API здесь НЕ нужен.
  build-win7:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x64'

      - name: Install dependencies (Win7 pins)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win7-debug.txt
          pip install "pyinstaller==5.13.2"

      - name: Build EXE (Win7, no matplotlib)
        run: pyinstaller seavision-win7.spec --distpath dist-win7 --workpath build-win7

      - name: Build EXE (Win7, debug, with matplotlib)
        run: pyinstaller seavision-win7-debug.spec --distpath dist-win7-debug --workpath build-win7-debug

      - name: Upload artifact (Win7)
        uses: actions/upload-artifact@v4
        with:
          name: seavision-windows-x64-win7
          path: dist-win7/seavision/        # Win7-совместимая сборка (Python 3.8), без matplotlib
          retention-days: 30

      - name: Upload artifact (Win7 debug)
        uses: actions/upload-artifact@v4
        with:
          name: seavision-windows-x64-win7-debug
          path: dist-win7-debug/seavision/  # Win7 debug-сборка с matplotlib (pics=<путь>)
          retention-days: 30
