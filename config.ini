[input]
type = udp            ; udp | nc
back_port = 4001
navi_port = 4002
my_ip = 127.0.0.1
data_path =  D:\DATA\old_radar_data\0606_4338.nc ; /media/leeiozh/EZH/DATA/old_radar_data/0606_4338.nc

[output]
udp = true
file = true
pics = false ; C:\Ocean\sv_new2026\out\
server_ip = 127.0.0.1
server_port = 4000
save_path = C:\Ocean\sv_new2026\out\ ; /media/leeiozh/EZH/EXPEDITIONS/RAE71/SeaVision/out/
out_times = 16

[pipeline]
queue_size = 20
restart_on_error = true

[constants]
AREA_AZIM_PX = 4096         ; number of azimuth pixels (number of backscatter lines)
AREA_READ_DIST_PX = 2048    ; number of pixels to read along one azimuth (one line)
AREA_DISTANCE_PX = 1192     ; distance to trimmed segment center (in pixels)
AREA_SIZE_PX = 192          ; half size of trimmed segment
K_NUM = 32                  ; number of wave numbers to cut dispersion portrait (in pixels)
N_SHOTS = 256               ; number of shots to processing
N_FREQ = 64                 ; number of frequencies in 1d spectrum
NUM_AREA = 36               ; number of segments to main direction calculation
SNR_A = 100                 ; coefficient in SWH = A + B \sqrt{SNR} (* 100)
SNR_B = 53                  ; coefficient in SWH = A + B \sqrt{SNR} (* 100)
MEAN = 8                   ; number of outputs to averaging
CHANGE_DIR_NUM_SHOTS = 16   ; number of shots to change main direction
RPM = 25                    ; radar antenna rotations per minute
